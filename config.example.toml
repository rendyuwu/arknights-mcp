# Example configuration for Arknights Intelligence MCP (PRD Section 19).
#
# Copy to config.toml and adjust. Secrets are NEVER placed in this file:
# supply OAuth/OIDC secrets via environment variables or a secret manager.
# Remote mode is disabled here; enabling non-loopback remote without HTTPS and
# valid OAuth/OIDC settings will refuse startup (SPEC §V9).

[database]
data_dir = "./data"
current_manifest = "./data/current.json"
read_only = true

[sync]
enabled_sources = ["arknights_assets_gamedata"]
allow_remote_download = true
retain_versions = 3
max_total_download_mb = 500
# Bounded parallelism for `sync` downloads (keep-alive connection reuse + a
# thread pool over the fetch set). 1 = serial. Default 8.
max_parallel_downloads = 8

[sync.arknights_assets_gamedata]
# Each region must point at a DISTINCT upstream tree so en/cn data is never
# silently mixed (SPEC §V5). Either use a "{server}" token in base_url (below,
# substituted per region), or give each region its own entry in [.base_urls].
base_url = "<configured allowlisted repository endpoint>/{server}"
servers = ["en", "cn"]

# [sync.arknights_assets_gamedata.base_urls]
# en = "<allowlisted EN repository endpoint>"
# cn = "<allowlisted CN repository endpoint>"

# Penguin Statistics drop-rate cache (v0.2 M8, SPEC §V58). Opt-in: it rides along
# with `sync` ONLY when penguin_statistics is BOTH in [sync].enabled_sources above
# AND enabled in the machine registry (`arknights-mcp source enable
# penguin_statistics`). When enabled, `sync` fetches each region's drops (en->US,
# cn->CN) into the SAME candidate after the game data; a penguin outage is caught
# and the build still promotes game-data-only (fail-open, §V58). Penguin data is
# CC BY-NC 4.0 (noncommercial + attribution, §V53).
# [sync.penguin_statistics]
# base_url = "https://penguin-stats.io/PenguinStats/api/v2"  # default if omitted

# Official announcement metadata (v0.2 M9, SPEC §V56/§T106). Enabled by default in
# the machine registry (metadata-only maximum scope, D14 review recorded). It rides
# along with `sync` ONLY when the source id is BOTH in [sync].enabled_sources above
# AND a feed_url is configured below (there is NO shipped default feed URL). When
# wired, `sync` fetches each region's announcement feed (en->Global, cn->CN) into the
# SAME candidate after the game data and stores ONLY the metadata allowlist
# (announce_id/title/date/url/category) -- never the article body/html/prose/image
# (§V16). A feed outage is caught and the build still promotes game-data-only
# (fail-open, §V58). Add the source ids to [sync].enabled_sources and set the feeds:
# [sync.arknights_global_official_news]
# feed_url = "<official Global announcement feed URL>"
# [sync.arknights_cn_official_news]
# feed_url = "<official CN announcement feed URL>"

[source_registry]
policy_file = "./DATA_SOURCES.md"
machine_registry = "./config/data_sources.toml"

[analysis]
def_high = 800
res_high = 50
pressure_window_seconds = 15
max_findings = 30

[mcp]
default_server = "en"
max_tool_response_kb = 200
schema_version = "1.0"

[mcp.local]
enabled = true
transport = "stdio"
log_level = "INFO"

[mcp.remote]
enabled = false
transport = "streamable-http"
bind_host = "127.0.0.1"
bind_port = 8000
path = "/mcp"
public_base_url = "https://mcp.example.com"
trust_proxy_headers = true
# Set true when a reverse proxy / tunnel (e.g. Cloudflare Tunnel, nginx) sits in
# front of a loopback bind and serves the public internet (§V40): forces the §V9
# HTTPS + OIDC startup gate and per-request bearer validation even on 127.0.0.1.
behind_proxy = false

[auth]
mode = "oidc"
issuer = "<OIDC issuer>"
audience = "<MCP audience>"
jwks_url = "<JWKS endpoint or discovery-derived value>"
required_scopes = ["arknights:read"]

[limits]
requests_per_minute_per_principal = 60
max_concurrent_requests_per_principal = 4
request_timeout_seconds = 30
max_page_size = 100
# §V11 request cap: max accepted request body size in bytes (default 1 MiB). A
# larger body is refused with 413 before the tool handler runs.
max_request_bytes = 1048576

[privacy]
log_tool_arguments = false
log_tool_results = false
operational_log_retention_days = 14
