# nginx TLS-terminating reverse proxy for the Arknights Intelligence MCP
# private remote (§I.api; §T55; §V9).
#
# This is the HTTPS front the server assumes: it terminates TLS and forwards to
# the loopback Streamable HTTP bind (127.0.0.1:8000/mcp). The upstream server
# runs with `[mcp.remote] behind_proxy = true`, so it enforces the §V9 HTTPS +
# OIDC startup gate and per-request bearer validation even though it binds
# loopback (§V40). nginx never sees or forwards secrets -- the bearer token flows
# through untouched in the Authorization header for the app to validate (§V10).
#
# Pre-auth flood protection lives HERE, not in the app: the per-principal §V11
# limiters only meter validated principals, so unauthenticated request storms are
# the proxy's job (see streamable_http.wrap_remote_app). The limit_req /
# limit_conn zones below cap that ingress before it reaches the bearer layer.
#
# Install: put TLS certs in place (certbot or your CA), drop this under
# /etc/nginx/sites-available/, symlink into sites-enabled/, `nginx -t`, reload.

# Ingress rate + connection zones keyed on the client address (pre-auth, §V11).
limit_req_zone $binary_remote_addr zone=mcp_req:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=mcp_conn:10m;

upstream arknights_mcp {
    # The loopback Streamable HTTP bind from config.toml ([mcp.remote] bind_host /
    # bind_port). keepalive reuses upstream connections for SSE streams.
    server 127.0.0.1:8000;
    keepalive 8;
}

# Plain HTTP -> HTTPS redirect. No MCP traffic is ever served over cleartext (§V9).
server {
    listen 80;
    listen [::]:80;
    server_name mcp.example.com;
    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mcp.example.com;

    # --- TLS termination (§V9). Replace with your real certificate paths. ---
    ssl_certificate     /etc/letsencrypt/live/mcp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Unauthenticated OAuth discovery (RFC 9728, §V45): the protected-resource
    # metadata an MCP OAuth client fetches to bootstrap `claude mcp login`. It must
    # reach the app WITHOUT a bearer (the app serves it above its own bearer gate),
    # so it is forwarded here rather than 404'd. Static JSON, no SSE; still capped by
    # the pre-auth ingress zones. The prefix covers both the bare well-known root and
    # the `/mcp`-suffixed form the app answers.
    location /.well-known/oauth-protected-resource {
        limit_req  zone=mcp_req burst=20 nodelay;
        limit_conn mcp_conn 16;

        proxy_pass http://arknights_mcp;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # The single MCP endpoint (§I.api). Everything else 404s.
    location /mcp {
        # Pre-auth ingress caps (§V11): burst a little, then 429. The app's
        # per-principal limiters take over once a bearer validates.
        limit_req  zone=mcp_req burst=20 nodelay;
        limit_conn mcp_conn 16;

        proxy_pass http://arknights_mcp;
        proxy_http_version 1.1;

        # Streamable HTTP uses long-lived SSE responses: never buffer, never let
        # the proxy time out a healthy open stream mid-session.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Preserve the Authorization: Bearer header untouched for §V10 validation,
        # and pass the real client context so the app + logs (§V12) see the origin.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # Cap request bodies at the proxy too (the app enforces its own §V11 cap).
    client_max_body_size 1m;
}
